<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Umfrage-Ergebnisse — Handball App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; padding: 2rem 1.25rem; }
    h1 { font-size: 1.75rem; font-weight: 700; color: #f8fafc; margin-bottom: 0.5rem; }
    .subtitle { color: #94a3b8; margin-bottom: 2rem; font-size: 0.95rem; }
    .toolbar { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
    .btn { padding: 0.65rem 1.2rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: #334155; color: #94a3b8; }
    .btn-secondary:hover { background: #475569; }
    .count-badge { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 0.5rem 1rem; font-size: 0.85rem; color: #94a3b8; }
    .count-badge strong { color: #3b82f6; }
    .loading { color: #94a3b8; font-size: 1rem; text-align: center; padding: 3rem; }
    .error { color: #ef4444; background: rgba(239,68,68,0.1); border: 1px solid #ef4444; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .result-entry { background: #1e293b; border: 1px solid #334155; border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; }
    .entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; flex-wrap: wrap; gap: 0.5rem; }
    .entry-name { font-weight: 700; color: #f1f5f9; font-size: 1rem; }
    .entry-roles { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.5rem; }
    .chip { background: rgba(59,130,246,0.15); color: #93c5fd; padding: 0.25rem 0.7rem; border-radius: 999px; font-size: 0.8rem; }
    .chip.app { background: rgba(16,185,129,0.15); color: #6ee7b7; }
    .entry-time { font-size: 0.75rem; color: #475569; margin-top: 0.5rem; }
    .entry-answers { margin-top: 0.5rem; }
    .entry-answer { font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.3rem; }
    .entry-answer strong { color: #e2e8f0; }
    .entry-feedback { margin-top: 0.75rem; background: #0f172a; border-radius: 8px; padding: 0.75rem; font-size: 0.85rem; color: #94a3b8; font-style: italic; line-height: 1.5; }
    .empty { text-align: center; padding: 3rem; color: #475569; }
    .filter-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-chip { background: #1e293b; border: 1px solid #334155; color: #94a3b8; padding: 0.35rem 0.9rem; border-radius: 999px; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; }
    .filter-chip:hover { border-color: #3b82f6; color: #e2e8f0; }
    .filter-chip.active { border-color: #3b82f6; background: rgba(59,130,246,0.15); color: #93c5fd; }
  </style>
</head>
<body>
<div class="container">
  <h1>📊 Umfrage-Ergebnisse</h1>
  <p class="subtitle">Alle Antworten aus der Handball-App Umfrage</p>

  <div class="toolbar">
    <button class="btn btn-primary" onclick="loadResults()">🔄 Aktualisieren</button>
    <button class="btn btn-secondary" onclick="exportCSV()">📥 Als CSV exportieren</button>
    <div class="count-badge"><strong id="totalCount">0</strong> Antworten</div>
  </div>

  <div class="filter-row" id="roleFilters"></div>
  <div id="resultsList">
    <div class="loading">Lade Ergebnisse...</div>
  </div>
</div>

<script>
const FIREBASE_URL = 'https://handball-385a3-default-rtdb.europe-west1.firebasedatabase.app';
let allResults = [];
let activeFilter = 'all';

async function loadResults() {
  const list = document.getElementById('resultsList');
  list.innerHTML = '<div class="loading">Lade von Firebase...</div>';
  try {
    const res = await fetch(FIREBASE_URL + '/results.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    allResults = data ? Object.entries(data).map(([k, v]) => ({ id: k, ...v })).sort((a,b) => b.timestamp - a.timestamp) : [];
    renderFilters();
    renderResults();
  } catch(err) {
    list.innerHTML = '<div class="error">Fehler beim Laden: ' + err.message + '</div>';
  }
}

function renderFilters() {
  const allRoles = new Set();
  allResults.forEach(r => (r.roles||[]).forEach(role => allRoles.add(role)));
  const filterRow = document.getElementById('roleFilters');
  filterRow.innerHTML = '<div class="filter-chip ' + (activeFilter==='all'?'active':'') + '" onclick="setFilter(\'all\')">Alle</div>';
  filterRow.innerHTML += [...allRoles].sort().map(r => '<div class="filter-chip ' + (activeFilter===r?'active':'') + '" onclick="setFilter(\'' + r + '\')">' + r + '</div>').join('');
}

function setFilter(role) {
  activeFilter = role;
  document.querySelectorAll('.filter-chip').forEach(c => {
    c.classList.toggle('active', c.textContent === (role==='all'?'Alle':role));
  });
  renderResults();
}

function renderResults() {
  const list = document.getElementById('resultsList');
  const filtered = activeFilter === 'all' ? allResults : allResults.filter(r => (r.roles||[]).includes(activeFilter));
  document.getElementById('totalCount').textContent = filtered.length;
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">Noch keine Ergebnisse' + (activeFilter !== 'all' ? ' für "' + activeFilter + '"' : '') + '.</div>';
    return;
  }
  const appTypeLabel = { app: '📱 App', web: '🌐 Web', beides: '🔀 Beides' };
  list.innerHTML = filtered.map(r => {
    const date = new Date(r.timestamp);
    const timeStr = date.toLocaleDateString('de-DE') + ' ' + date.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
    const answers = Object.entries(r.answers || {}).map(([k,v]) => '<div class="entry-answer"><strong>' + k + ':</strong> ' + (Array.isArray(v) ? v.join(', ') : v) + '</div>').join('');
    return '<div class="result-entry">' +
      '<div class="entry-header">' +
        '<div class="entry-name">' + escHtml(r.name || 'Anonym') + '</div>' +
        '<div>' + (r.appType ? '<span class="chip app">' + (appTypeLabel[r.appType] || r.appType) + '</span>' : '') + '</div>' +
      '</div>' +
      '<div class="entry-roles">' + (r.roles||[]).map(role => '<span class="chip">' + role + '</span>').join('') + '</div>' +
      (answers ? '<div class="entry-answers">' + answers + '</div>' : '') +
      (r.feedback ? '<div class="entry-feedback">💬 ' + escHtml(r.feedback) + '</div>' : '') +
      '<div class="entry-time">📅 ' + timeStr + '</div>' +
    '</div>';
  }).join('');
}

function exportCSV() {
  if (allResults.length === 0) return alert('Keine Daten zum Exportieren.');
  const rows = [['Timestamp','Name','Rollen','AppType','Feedback']];
  allResults.forEach(r => {
    rows.push([
      new Date(r.timestamp).toLocaleString('de-DE'),
      (r.name||''),
      (r.roles||[]).join('; '),
      r.appType || '',
      (r.feedback||'').replace(/\n/g,' ')
    ]);
  });
  const csv = rows.map(r => r.map(c => '"' + c.replace(/"/g,'""') + '"').join(',')).join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'handball-umfrage.csv'; a.click();
  URL.revokeObjectURL(url);
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadResults();
setInterval(loadResults, 30000);
</script>
</body>
</html>
